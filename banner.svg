<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Text / Accent Gradients -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    
    <linearGradient id="awsGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9900" />
      <stop offset="100%" stop-color="#FF5500" />
    </linearGradient>

    <linearGradient id="gcpGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4" />
      <stop offset="100%" stop-color="#34A853" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="8" />
  <rect width="100%" height="100%" fill="url(#grid)" rx="8" />

  <!-- Decorative Glowing Shapes -->
  <circle cx="750" cy="50" r="100" fill="#3B82F6" opacity="0.1" filter="blur(40px)" />
  <circle cx="50" cy="150" r="80" fill="#8B5CF6" opacity="0.1" filter="blur(30px)" />

  <!-- Accent bar -->
  <rect x="0" y="0" width="6" height="200" fill="url(#textGrad)" rx="3" />

  <!-- Name -->
  <text x="40" y="70" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="1">
    SIVASUBRAMANIAN
  </text>

  <!-- Core Title -->
  <text x="40" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="url(#textGrad)">
    Compliance-First Agentic AI Architect &amp; Test Specialist
  </text>

  <!-- Badges / Affiliations -->
  <!-- AWS Community Builder -->
  <g transform="translate(40, 140)">
    <rect width="180" height="28" rx="14" fill="#1e293b" stroke="url(#awsGrad)" stroke-width="1.5" />
    <text x="90" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#f8fafc" text-anchor="middle">
      ☁️ AWS Community Builder
    </text>
  </g>

  <!-- Google Cloud GAIL Certified -->
  <g transform="translate(235, 140)">
    <rect width="210" height="28" rx="14" fill="#1e293b" stroke="url(#gcpGrad)" stroke-width="1.5" />
    <text x="105" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#f8fafc" text-anchor="middle">
      🤖 Google Cloud GAIL Certified
    </text>
  </g>

  <!-- 18+ Years Experience -->
  <g transform="translate(460, 140)">
    <rect width="150" height="28" rx="14" fill="#1e293b" stroke="#64748b" stroke-width="1" />
    <text x="75" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#94a3b8" text-anchor="middle">
      🏆 18+ Years Exp
    </text>
  </g>
</svg>
